<!DOCTYPE html>
<html lang="en">
<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sia Tech | AI Grammar Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
}

.container{
    width:100%;
    max-width:1000px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:30px;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.brand{
    font-weight:800;
    font-size:1.2rem;
    text-decoration:none;
    background:linear-gradient(45deg,#00f2ff,#ffffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    transition:0.3s;
}

.brand:hover{
    transform:scale(1.1);
}

.title-section{
    text-align:center;
    margin-bottom:30px;
}

.title-section h1{
    font-size:2.2rem;
    margin-bottom:8px;
}

.title-section p{
    opacity:0.8;
    font-size:0.95rem;
}

textarea{
    width:100%;
    min-height:150px;
    padding:15px;
    border-radius:15px;
    border:none;
    outline:none;
    font-size:1rem;
    resize:vertical;
}

.button-group{
    margin-top:15px;
    display:flex;
    gap:15px;
}

button{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

#check-btn{
    background:linear-gradient(45deg,#00f2ff,#4facfe);
    color:#000;
}

#clear-btn{
    background:#ffffff22;
    color:white;
}

button:hover{
    transform:translateY(-3px);
}

.loading{
    display:none;
    text-align:center;
    margin-top:20px;
}

.results{
    margin-top:25px;
    display:none;
}

.result-card{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

.correct{
    color:#00ffae;
    font-weight:bold;
}

.incorrect{
    color:#ff6b6b;
    font-weight:bold;
}

footer{
    margin-top:30px;
    text-align:center;
    opacity:0.6;
    font-size:0.8rem;
}
</style>
</head>

<body>

<div class="container">

<header>
    <div></div>
    <a class="brand" href="https://saiyam-creator.github.io/portfolio/" target="_blank">
        ⚡ Sia Tech
    </a>
</header>

<div class="title-section">
    <h1>AI Grammar Checker</h1>
    <p>Powered by Sia Tech Intelligence</p>
</div>

<textarea id="text-input" placeholder="Type your sentence here..."></textarea>

<div class="button-group">
    <button id="check-btn">Analyze</button>
    <button id="clear-btn">Clear</button>
</div>

<div class="loading" id="loading">
    <p>Analyzing...</p>
</div>

<div class="results" id="results"></div>

<footer>
    © 2026 Sia Tech — Future Unicorn in Progress 🚀
</footer>

</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const textInput=document.getElementById("text-input");
const checkBtn=document.getElementById("check-btn");
const clearBtn=document.getElementById("clear-btn");
const results=document.getElementById("results");
const loading=document.getElementById("loading");

async function checkText(){

    const original=textInput.value.trim();
    if(!original){
        alert("Enter text first.");
        return;
    }

    loading.style.display="block";
    results.style.display="none";
    results.innerHTML="";

    try{
        const response=await fetch(
            "https://s143a-ai-grammar-checker.hf.space/check",
            {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({text:original})
            }
        );

        const data=await response.json();
        loading.style.display="none";
        results.style.display="block";

        const corrected=data.corrected_text;

        results.innerHTML+=`
            <div class="result-card">
                <div class="correct">Corrected:</div>
                <div>${corrected}</div>
            </div>
        `;

        const changes=findDifferences(original,corrected);

        changes.forEach(c=>{
            results.innerHTML+=`
                <div class="result-card">
                    <div class="incorrect">Incorrect: ${c.from}</div>
                    <div class="correct">Correct: ${c.to}</div>
                </div>
            `;
        });

    }catch(error){
        loading.style.display="none";
        results.style.display="block";
        results.innerHTML=`<div class="result-card">Error: ${error.message}</div>`;
    }
}

function generateHighlightedText(original, corrected) {

    const diff = JsDiff.diffWords(original, corrected);
    let result = "";

    diff.forEach(part => {

        if (part.added) {
            result += `<span style="color:#00ff99;font-weight:bold;">${part.value}</span>`;
        }

        else if (part.removed) {
            result += `<span style="color:#ff4d4d;text-decoration:line-through;">${part.value}</span>`;
        }

        else {
            result += part.value;
        }

    });

    return result;
}
function findDifferences(original, corrected) {

    const orig = original.trim().split(/\s+/);
    const corr = corrected.trim().split(/\s+/);

    let changes = [];
    let i = 0, j = 0;

    while (i < orig.length || j < corr.length) {

        if (orig[i] === corr[j]) {
            i++;
            j++;
            continue;
        }

        // insertion case
        if (orig[i] !== corr[j] && orig[i] === corr[j + 1]) {
            changes.push({
                from: "",
                to: corr[j]
            });
            j++;
            continue;
        }

        // deletion case
        if (orig[i] !== corr[j] && orig[i + 1] === corr[j]) {
            changes.push({
                from: orig[i],
                to: ""
            });
            i++;
            continue;
        }

        // replacement case
        changes.push({
            from: orig[i] || "",
            to: corr[j] || ""
        });

        i++;
        j++;
    }

    return changes;
}
function clearText(){
    textInput.value="";
    results.style.display="none";
    results.innerHTML="";
}

checkBtn.addEventListener("click",checkText);
clearBtn.addEventListener("click",clearText);

});
</script>

</body>
</html>
